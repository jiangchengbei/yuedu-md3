name: 同时自动打包双版本

on:
  push:
    branches: [ "main", "master" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest 
    strategy:
      matrix:
        build_type: [debug, release]

    steps:
    - name: 1. 下载代码到云电脑
      uses: actions/checkout@v6 

    - name: 2. 配置 Java 环境 (JDK 17)
      uses: actions/setup-java@v4 
      with:
        java-version: '17' 
        distribution: 'temurin'

    - name: 3. 给 Gradle 编译工具运行权限
      run: chmod +x gradlew

    - name: 4. 开始编译打包
      run: |
        if [ "${{ matrix.build_type }}" = "debug" ]; then
          ./gradlew assembleDebug
        else
          ./gradlew assembleRelease
        fi

    - name: 5. 提取并上传 APK 文件
      uses: actions/upload-artifact@v4 
      with:
        name: 阅读MD3-${{ matrix.build_type }}版-去手机MT签名
        path: "**/*.apk" # 【核心】用双星号全盘通搜，绝不会漏掉文件
