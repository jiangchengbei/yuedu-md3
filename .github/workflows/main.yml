name: 自动打包 Android APK

# 什么时候触发打包？
on:
  push:
    branches: [ "main", "master" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: 1. 下载代码到云电脑
      uses: actions/checkout@v4 # 【已修复】更新为 v4

    - name: 2. 配置 Java 环境 (JDK 17)
      uses: actions/setup-java@v4 # 【已修复】更新为 v4
      with:
        java-version: '17' 
        distribution: 'temurin'

    - name: 3. 给 Gradle 编译工具运行权限
      run: chmod +x gradlew

    - name: 4. 开始编译打包 (Debug版)
      run: ./gradlew assembleDebug

    - name: 5. 提取并上传 APK 文件
      uses: actions/upload-artifact@v4 # 【已修复】关键：更新为 v4
      with:
        name: 阅读MD3-测试版APK 
        path: app/build/outputs/apk/debug/*.apk
